<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3956390078338144" crossorigin="anonymous"></script>
  <title>▶ YT MP3 — Free YouTube to MP3 Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&font-display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #7c5cfc;
      --accent2: #5b8af5;
      --success: #22d3a5;
      --danger: #ff4757;
      --warn: #f59e0b;
      --text: #f0f0f8;
      --muted: #7c7c9a;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ── */
    header { padding: clamp(20px, 4vw, 32px) 24px 0; text-align: center; }
    .logo { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .logo-play {
      font-size: clamp(1.2rem, 3.5vw, 1.5rem);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;
    }
    .logo-text { font-size: clamp(1.2rem, 3.5vw, 1.5rem); font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .logo-text span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline { margin-top: 6px; color: var(--muted); font-size: clamp(0.78rem, 2.2vw, 0.85rem); }

    /* ── Main ── */
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: clamp(28px, 5vw, 44px) 20px 48px; }

    h1 {
      font-size: clamp(1.45rem, 5vw, 2.5rem); font-weight: 800;
      text-align: center; line-height: 1.25;
      letter-spacing: clamp(-0.5px, -0.02em, -1px); max-width: 560px;
    }
    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { margin-top: 8px; margin-bottom: 4px; color: var(--muted); font-size: clamp(0.82rem, 2.5vw, 0.95rem); text-align: center; }


    /* ── Input card ── */
    .input-card {
      margin-top: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px; display: flex; gap: 8px;
    }
    .url-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 1rem; /* 16px — prevents iOS Safari auto-zoom */
      padding: 12px 14px; min-width: 0;
    }
    .url-input::placeholder { color: var(--muted); font-size: 0.9rem; }

    .btn-primary {
      flex-shrink: 0; padding: 12px 24px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: inherit; font-size: clamp(0.85rem, 2.5vw, 0.95rem); font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
      min-height: 44px; /* touch target */
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-msg { margin-top: 12px; color: var(--danger); font-size: clamp(0.8rem, 2.2vw, 0.85rem); display: none; }


    /* ── Video result card ── */
    .video-card {
      margin-top: 20px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; display: none;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .video-card-inner { display: flex; align-items: center; gap: 14px; padding: 14px; }
    .video-thumb {
      flex-shrink: 0; width: 108px; height: 60px;
      border-radius: 8px; object-fit: cover; background: var(--surface2);
    }
    .video-meta { flex: 1; min-width: 0; }
    .video-title {
      font-size: clamp(0.88rem, 2.5vw, 0.95rem); font-weight: 600; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.4;
    }
    .video-sub { margin-top: 4px; font-size: clamp(0.72rem, 2vw, 0.78rem); color: var(--muted); }
    .quality-badge {
      display: inline-block; margin-top: 5px;
      padding: 2px 7px; border-radius: 4px;
      background: rgba(124,92,252,0.18); color: var(--accent);
      font-size: clamp(0.65rem, 1.8vw, 0.72rem); font-weight: 700; letter-spacing: 0.03em;
    }

    .card-actions { padding: 0 14px 14px; }

    .progress-wrap {
      height: 5px; background: var(--surface2); border-radius: 99px;
      overflow: hidden; margin-bottom: 8px; display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; width: 0%; transition: width 0.5s ease;
    }
    .status-text { font-size: clamp(0.75rem, 2vw, 0.8rem); color: var(--muted); margin-bottom: 10px; display: none; }

    /* ── Download button + actions ── */
    .download-actions { display: flex; flex-direction: column; gap: 8px; }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,165,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(34,211,165,0); }
    }
    .btn-download {
      width: 100%; padding: 15px 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--success), #18b893);
      color: #fff; font-family: inherit; font-size: clamp(0.95rem, 3vw, 1.05rem); font-weight: 700;
      cursor: pointer; display: none; align-items: center; justify-content: center;
      gap: 8px; text-decoration: none; transition: opacity 0.2s; min-height: 48px;
    }
    .btn-download:hover { opacity: 0.9; }
    .btn-download.pulse { animation: pulse-glow 1.6s ease-in-out infinite; }
    .btn-download svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-copy-link {
      width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface2); color: var(--muted); font-family: inherit;
      font-size: clamp(0.78rem, 2.2vw, 0.84rem); font-weight: 600; cursor: pointer; display: none;
      align-items: center; justify-content: center; gap: 6px;
      transition: border-color 0.2s, color 0.2s; min-height: 44px;
    }
    .btn-copy-link:hover { border-color: var(--accent); color: var(--text); }
    .btn-copy-link.copied { color: var(--success); border-color: var(--success); }



    /* ── Footer ── */
    footer {
      text-align: center; padding: 24px 20px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 16px; flex-wrap: wrap;
    }
    .footer-brand {
      font-size: clamp(0.82rem, 2.2vw, 0.9rem); font-weight: 700;
      letter-spacing: 0.04em; color: var(--text);
    }
    .footer-brand span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .footer-divider { color: var(--border); font-size: 1rem; }
    .footer-copy {
      font-size: clamp(0.7rem, 1.8vw, 0.75rem); color: var(--muted); font-weight: 400;
    }
    .footer-handle {
      font-size: clamp(0.78rem, 2vw, 0.84rem); font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; transition: opacity 0.2s;
    }
    .footer-handle:hover { opacity: 0.75; }

    /* ── Quality selector ── */
    .quality-selector {
      margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;
    }
    .q-btn {
      flex: 1; min-width: 72px; padding: 10px 10px; border: 1px solid var(--border);
      border-radius: 9px; background: var(--surface); color: var(--muted);
      font-family: inherit; font-size: clamp(0.75rem, 2.2vw, 0.82rem); font-weight: 600;
      cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
      min-height: 40px;
    }
    .q-btn:hover { border-color: var(--accent); color: var(--text); }
    .q-btn.active {
      border-color: var(--accent); background: rgba(124,92,252,0.15);
      color: var(--accent);
    }
    .q-btn.mp4-btn.active {
      border-color: var(--accent2); background: rgba(91,138,245,0.15);
      color: var(--accent2);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      body { min-height: unset; }
      main { flex: 0 0 auto; padding: 20px 14px 24px; }
      header { padding: 18px 16px 0; }
    }
    @media (max-width: 540px) {
      .input-card { flex-direction: column; padding: 10px; gap: 6px; }
      .btn-primary { width: 100%; padding: 14px; }
      .video-card-inner { flex-direction: column; align-items: flex-start; }
      .video-thumb { width: 100%; height: 140px; }
      .q-btn { min-width: 60px; padding: 10px 6px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <span class="logo-play">▶</span>
    <span class="logo-text">YT <span>MP3</span></span>
  </a>
</header>

<main>
  <h1>Download any YouTube video<br/>as <span>MP3</span> or <span>MP4</span></h1>

  <!-- ── Single panel ── -->
  <div id="panel-single" style="width:100%;max-width:680px">
    <div class="input-card">
      <input type="url" class="url-input" id="urlInput"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" inputmode="url" />
      <button class="btn-primary" id="btnConvert" onclick="handleConvert()">Convert</button>
    </div>

    <!-- Quality selector -->
    <div class="quality-selector">
      <button class="q-btn" data-fmt="mp3" data-q="128K" onclick="selectQuality(this)">MP3 128K</button>
      <button class="q-btn" data-fmt="mp3" data-q="192K" onclick="selectQuality(this)">MP3 192K</button>
      <button class="q-btn active" data-fmt="mp3" data-q="320K" onclick="selectQuality(this)">MP3 320K ★</button>
      <button class="q-btn mp4-btn" data-fmt="mp4" data-q="" onclick="selectQuality(this)">MP4 Video</button>
    </div>

    <p class="error-msg" id="singleError"></p>


    <!-- Video result -->
    <div class="video-card" id="videoCard">
      <div class="video-card-inner">
        <img class="video-thumb" id="videoThumb" src="" alt="" />
        <div class="video-meta">
          <div class="video-title" id="videoTitle"></div>
          <div class="video-sub" id="videoSub"></div>
          <span class="quality-badge" id="qualityBadge">320K MP3</span>
        </div>
      </div>
      <div class="card-actions">
        <p class="status-text" id="statusText"></p>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="download-actions">
          <a class="btn-download" id="btnDownload" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download MP3
          </a>
          <button class="btn-copy-link" id="btnCopyLink" onclick="copyDownloadLink()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy download link
          </button>
        </div>
      </div>
    </div>
  </div>


</main>

<footer>
  <span class="footer-brand">▶ YT <span>MP3</span></span>
  <span class="footer-divider">·</span>
  <span class="footer-copy">For personal use only. Respect copyright laws.</span>
  <span class="footer-divider">·</span>
  <a class="footer-handle" href="https://twitter.com/KhaledQ84Ever" target="_blank">@KhaledQ84Ever</a>
</footer>

<script>
  let cookieId = null;
  let pollTimer = null;
  let currentDownloadUrl = null;
  let selectedFmt = 'mp3';
  let selectedQ   = '320K';

  const $ = id => document.getElementById(id);

  // ── Quality selector ──
  function selectQuality(btn) {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFmt = btn.dataset.fmt;
    selectedQ   = btn.dataset.q;
  }

  // ── Single convert ──
  function showSingleError(msg) {
    const el = $('singleError');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideSingleError() {
    $('singleError').style.display = 'none';
  }

  function setConverting(on) {
    $('btnConvert').disabled = on;
    $('btnConvert').textContent = on ? 'Loading…' : 'Convert';
    $('urlInput').disabled = on;
  }

  async function handleConvert() {
    clearInterval(pollTimer);
    const url = $('urlInput').value.trim();
    if (!url) { showSingleError('Please paste a YouTube URL'); return; }

    hideSingleError();
    $('videoCard').style.display = 'none';
    $('btnDownload').style.display = 'none';
    $('btnCopyLink').style.display = 'none';
    $('progressWrap').style.display = 'none';
    $('statusText').style.display = 'none';
    currentDownloadUrl = null;
    setConverting(true);

    try {
      const infoRes = await fetch('/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const info = await infoRes.json();
      if (!infoRes.ok) {
        showSingleError(info.error || 'Could not fetch video info');
        setConverting(false);
        return;
      }

      $('videoThumb').src = info.thumbnail;
      $('videoTitle').textContent = info.title;
      $('videoSub').textContent = `${info.uploader}  ·  ${info.duration}`;
      $('qualityBadge').textContent = selectedFmt === 'mp4' ? 'MP4 Video' : `${selectedQ} MP3`;
      $('videoCard').style.display = 'block';

      const startRes = await fetch('/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: info.url || url, cookie_id: cookieId, title: info.title, uploader: info.uploader, format: selectedFmt, quality: selectedQ })
      });
      const startData = await startRes.json();
      if (!startRes.ok) {
        showSingleError(startData.error || 'Failed to start conversion');
        setConverting(false);
        return;
      }

      pollJob(startData.job_id);
    } catch {
      showSingleError('Network error. Please try again.');
      setConverting(false);
    }
  }

  function pollJob(jobId) {
    const progressWrap = $('progressWrap');
    const progressBar  = $('progressBar');
    const statusText   = $('statusText');

    if (progressWrap) progressWrap.style.display = 'block';
    if (statusText) { statusText.style.display = 'block'; statusText.textContent = 'Converting…'; }

    let fake = 5;
    progressBar.style.width = fake + '%';
    const grow = setInterval(() => {
      if (fake < 30) { fake += Math.random() * 4; progressBar.style.width = fake + '%'; }
    }, 1200);

    let attempts = 0;
    pollTimer = setInterval(async () => {
      if (++attempts > 150) {
        clearInterval(pollTimer); clearInterval(grow);
        showSingleError('Timed out. Try again.'); setConverting(false);
        return;
      }
      try {
        const res = await fetch(`/status/${jobId}`);
        const data = await res.json();

        // Real progress from backend
        if (data.progress != null && data.progress > fake) {
          clearInterval(grow);
          fake = data.progress;
          progressBar.style.width = fake + '%';
          if (data.progress < 95) {
            statusText.textContent = `Downloading… ${data.progress}%`;
          }
        }

        if (data.status === 'done') {
          clearInterval(pollTimer); clearInterval(grow);
          progressBar.style.width = '100%';
          statusText.textContent = 'Done! Starting download…';
          setTimeout(() => {
            progressWrap.style.display = 'none';
            statusText.style.display = 'none';
            const dlUrl = `/download/${jobId}`;
            currentDownloadUrl = dlUrl;

            const tmp = document.createElement('a');
            tmp.href = dlUrl;
            tmp.download = data.filename || 'audio.mp3';
            document.body.appendChild(tmp);
            tmp.click();
            document.body.removeChild(tmp);

            const dl = $('btnDownload');
            dl.href = dlUrl;
            dl.download = data.filename || 'audio.mp3';
            const label = selectedFmt === 'mp4' ? 'Download MP4' : 'Download MP3';
            dl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ${label}`;
            dl.style.display = 'flex';
            dl.classList.add('pulse');
            setTimeout(() => dl.classList.remove('pulse'), 6000);

            $('btnCopyLink').style.display = 'flex';
            setConverting(false);
          }, 400);
        } else if (data.status === 'error') {
          clearInterval(pollTimer); clearInterval(grow);
          progressWrap.style.display = 'none';
          statusText.style.display = 'none';
          showSingleError(data.error || 'Conversion failed.');
          setConverting(false);
        }
      } catch {}
    }, 2000);
  }

  // ── Copy download link ──
  async function copyDownloadLink() {
    if (!currentDownloadUrl) return;
    const full = location.origin + currentDownloadUrl;
    try {
      await navigator.clipboard.writeText(full);
      $('btnCopyLink').textContent = '✓ Copied!';
      $('btnCopyLink').classList.add('copied');
      setTimeout(() => {
        $('btnCopyLink').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy download link`;
        $('btnCopyLink').classList.remove('copied');
      }, 2000);
    } catch {
      prompt('Copy this link:', full);
    }
  }

  // ── Enter key & auto-paste ──
  $('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleConvert(); });
  $('urlInput').addEventListener('focus', async () => {
    if ($('urlInput').value) return;
    try {
      const text = await navigator.clipboard.readText();
      if (text && (text.includes('youtube.com') || text.includes('youtu.be')))
        $('urlInput').value = text;
    } catch {}
  });
</script>
</body>
</html>
